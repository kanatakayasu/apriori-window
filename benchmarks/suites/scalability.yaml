name: scalability
description: "Scalability benchmarks (A3-P)"
experiments:
  - id: A3-P
    description: "N sweep for scalability analysis"
    dataset: synthetic_poisson
    vary: n_transactions
    values: [1000, 10000, 100000, 1000000]
    fixed: {lambda_baskets: 2.0, n_categories: 10}
    seeds: [0, 1, 2]
    skip_gt: true
