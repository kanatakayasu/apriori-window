# Stage A: Experiment 3 - Scalability (A3-P)
exp_id: exp020
suite: stageA_scalability
description: "N sweep - wall-clock time scalability"
dataset: synthetic_poisson
vary: n_transactions
values: [1000, 10000, 100000, 1000000]
